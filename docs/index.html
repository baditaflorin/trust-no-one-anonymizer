<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trust No One Anonymizer</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101820;
        color: #f7fbff;
      }

      main {
        width: min(760px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        max-width: 60ch;
        color: #d4e2ee;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        color: #6ee7b7;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 24px;
      }

      .meta {
        margin-top: 32px;
        color: #91a6b8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Trust No One Anonymizer</h1>
      <p>
        Client-side face and voice anonymization for browser video calls. The full app is being
        published here from the first commit.
      </p>
      <div class="links">
        <a href="https://github.com/baditaflorin/trust-no-one-anonymizer">GitHub repository</a>
        <a href="https://www.paypal.com/paypalme/florinbadita">Support via PayPal</a>
      </div>
      <p class="meta">Version: 0.1.0-dev · Commit: initial scaffold</p>
    </main>
  </body>
</html>
